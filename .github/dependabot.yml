version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/parent-portal
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /apps/teacher-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /apps/admin-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: nuget
    directory: /services/backend-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Microsoft.OpenApi 3.x is a breaking major version not yet supported by
      # Microsoft.AspNetCore.OpenApi — see PR #50. Revisit once ASP.NET Core adds
      # official support (tracked upstream: microsoft/OpenAPI.NET major version notes).
      - dependency-name: "Microsoft.OpenApi"
        update-types: ["version-update:semver-major"]
      # These track the .NET SDK/runtime version tightly; major bumps ahead of the
      # SDK upgrade routinely break the build.
      - dependency-name: "Microsoft.AspNetCore.*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "Microsoft.EntityFrameworkCore*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: nuget
    directory: /apps/student-desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "Microsoft.AspNetCore.*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
