name: Web Apps CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [parent-portal, teacher-web, admin-web]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # teacher-web consumes packages/direct-messaging via a `file:` dependency.
      # npm doesn't install a file-linked package's own deps (no npm workspaces
      # here), so without this its react/typescript devDependencies are missing
      # and `tsc -b` fails to resolve `react` when compiling the linked source.
      - name: Install shared package dependencies (direct-messaging)
        if: matrix.app == 'teacher-web'
        run: npm ci
        working-directory: packages/direct-messaging

      # All three apps consume packages/api-client via a `file:` dependency
      # (issue #87). Same reasoning as direct-messaging above: npm doesn't
      # install a file-linked package's own devDependencies, so install them
      # explicitly for every app in this matrix.
      - name: Install shared package dependencies (api-client)
        run: npm ci
        working-directory: packages/api-client

      # teacher-web consumes packages/shared-editor-kit via a `file:` dependency.
      # Same reasoning as direct-messaging above: without this its own
      # devDependencies are missing and the build fails to resolve them.
      - name: Install shared package dependencies (shared-editor-kit)
        if: matrix.app == 'teacher-web'
        run: npm ci
        working-directory: packages/shared-editor-kit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit for critical vulnerabilities
        run: npm audit --audit-level=critical
