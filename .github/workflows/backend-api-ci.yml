name: Backend API CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-api-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend-api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test BackendApi.Tests -c Release

      - name: Check for vulnerable NuGet packages
        run: |
          set -o pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.log
          if grep -q "has the following vulnerable packages" vuln.log; then
            echo "::error::Vulnerable NuGet package(s) detected"
            exit 1
          fi

  # services/backend-api-tests predates the services/backend-api/BackendApi.Tests project
  # added by this workflow (#27) and was never wired in — it holds the bulk of this
  # container's controller test coverage (Community/Users/Marks/Assignments/Browsing/Fees/
  # Materials), so without this job CI silently skipped all of it.
  backend-api-tests-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend-api-tests
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test -c Release
