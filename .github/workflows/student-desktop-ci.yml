name: Student Desktop CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  student-desktop-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/student-desktop
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test StudentDesktop.Tests -c Release

      - name: Check for vulnerable NuGet packages
        run: |
          set -o pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.log
          if grep -q "has the following vulnerable packages" vuln.log; then
            echo "::error::Vulnerable NuGet package(s) detected"
            exit 1
          fi
