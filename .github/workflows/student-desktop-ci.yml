name: Student Desktop CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/student-desktop/**"
      - ".github/workflows/student-desktop-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/student-desktop/**"
      - ".github/workflows/student-desktop-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/student-desktop
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test StudentDesktop.Tests -c Release
