name: Stale PRs and issues

on:
  schedule:
    - cron: "0 4 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 21
          days-before-close: 7
          exempt-issue-labels: pinned,security
          # Dependabot PRs get rebased weekly, so exempt them from becoming stale.
          exempt-pr-labels: pinned,security,dependencies
          stale-issue-message: >
            This issue has had no activity for 21 days and will be closed in 7 days
            if there's no further activity. Comment to keep it open.
          stale-pr-message: >
            This PR has had no activity for 21 days and will be closed in 7 days
            if there's no further activity. Rebase or comment to keep it open.
