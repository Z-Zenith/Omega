services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus_dev
    ports:
      - "5432:5432"
    volumes:
      - campus-pg-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus -d campus"]
      interval: 5s
      timeout: 5s
      retries: 10
  ai-services:
    build:
      context: ./services/ai-services
      dockerfile: Dockerfile
    container_name: campus-ai-services
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campus-pg-data:
